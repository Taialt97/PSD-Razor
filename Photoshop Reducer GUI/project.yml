name: PSD Razor
options:
  bundleIdPrefix: com.psdrazor
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  PSD Razor:
    type: application
    platform: macOS
    sources:
      - path: PSDRazorApp
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.psdrazor.psd-razor
        PRODUCT_NAME: PSD Razor
        INFOPLIST_FILE: PSDRazorApp/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        ARCHS: "arm64 x86_64"
        ONLY_ACTIVE_ARCH: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: PSDRazorApp/PSDRazor.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
      debug:
        CODE_SIGN_IDENTITY: "-"
      release:
        CODE_SIGN_IDENTITY: "-"
    preBuildScripts:
      - name: "Build psd_ockham Universal Binary"
        shell: /bin/bash
        script: |
          REPO_ROOT="${SRCROOT}/.."
          OUTPUT="${SRCROOT}/psd_ockham"
          if [ -d "$REPO_ROOT/src" ]; then
            echo "Building psd_ockham universal binary from source..."
            clang \
              -arch arm64 -arch x86_64 \
              -O2 \
              -mmacosx-version-min=13.0 \
              -I"$REPO_ROOT/src/libpsd/include" \
              -I"$REPO_ROOT/src/libpsd/src" \
              "$REPO_ROOT/src/main.c" \
              "$REPO_ROOT/src/libpsd/src/descriptor.c" \
              "$REPO_ROOT/src/libpsd/src/file_header.c" \
              "$REPO_ROOT/src/libpsd/src/image_resource.c" \
              "$REPO_ROOT/src/libpsd/src/layer_mask.c" \
              "$REPO_ROOT/src/libpsd/src/linked_layer.c" \
              "$REPO_ROOT/src/libpsd/src/psd.c" \
              "$REPO_ROOT/src/libpsd/src/psd_system.c" \
              "$REPO_ROOT/src/libpsd/src/stream.c" \
              -o "$OUTPUT"
            chmod +x "$OUTPUT"
            echo "psd_ockham built (universal: arm64 + x86_64)"
          else
            echo "Using existing psd_ockham binary"
          fi
    postCompileScripts:
      - name: "Copy and Sign psd_ockham"
        shell: /bin/bash
        script: |
          RESOURCES_DIR="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "$RESOURCES_DIR"
          cp "${SRCROOT}/psd_ockham" "$RESOURCES_DIR/psd_ockham"
          chmod +x "$RESOURCES_DIR/psd_ockham"

          SIGN_IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:-"-"}"
          codesign --force --options runtime --sign "$SIGN_IDENTITY" "$RESOURCES_DIR/psd_ockham"
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/psd_ockham
